# Build and deploy to GitHub Pages when you push to `main`.
# Repo → Settings → Pages → Source: GitHub Actions (not “Deploy from a branch”).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Project site: https://USER.github.io/REPO/  →  base /REPO/
      # User site:   repo named OWNER.github.io     →  base /
      - name: Compute Vite base for GitHub Pages
        id: vite_base
        shell: bash
        run: |
          NAME='${{ github.event.repository.name }}'
          OWNER='${{ github.repository_owner }}'
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: ${{ steps.vite_base.outputs.vite_base }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
